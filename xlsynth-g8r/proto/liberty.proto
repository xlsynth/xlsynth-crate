syntax = "proto3";

package liberty;

// Compact, evaluator-oriented Liberty wire representation. LUT values use
// float32 and axis vectors are interned library-wide. Rust consumers expand
// this into the normalized in-memory model before evaluation.
message Library {
  // Wire-format discriminator. Old Liberty proto encodings use a message at
  // tag 1, so their incompatible wire type is rejected rather than silently
  // misdecoded.
  fixed64 format_magic = 1;
  repeated Cell cells = 2;
  LibraryUnits units = 3;
  repeated LuTableTemplate lu_table_templates = 4;
  repeated string threshold_voltage_groups = 5;
  uint32 default_threshold_voltage_group_id = 6;
  repeated sint32 threshold_voltage_group_class_indices = 7;
  // Liberty `nom_voltage`, used by single-rail switching-energy models.
  optional double nominal_voltage = 8;
  // Free-form, user-supplied source-collateral identity.
  string provenance = 9;
  // Basenames of source Liberty files in parsing order.
  repeated string source_files = 10;
  // Nonzero axis IDs are 1-based references into this list.
  repeated LutAxis lut_axes = 11;
}

message Cell {
  string name = 1;
  repeated Pin pins = 2;
  double area = 3;
  repeated Sequential sequential = 4;
  ClockGate clock_gate = 5;
  uint32 threshold_voltage_group_id = 6;
  // Native Liberty `dont_use`, before any external filtering policy.
  optional bool dont_use = 7;
}

enum PinDirection {
  INVALID = 0;
  OUTPUT = 1;
  INPUT = 2;
}

message Pin {
  PinDirection direction = 1;
  string function = 2;
  string name = 3;
  bool is_clocking_pin = 4;
  optional double capacitance = 5;
  optional double rise_capacitance = 6;
  optional double fall_capacitance = 7;
  optional double max_capacitance = 8;
  repeated TimingArc timing_arcs = 9;
  repeated InternalPower internal_power = 10;
}

message ClockGate {
  string clock_pin = 1;
  string output_pin = 2;
  repeated string enable_pins = 3;
  repeated string test_pins = 4;
}

message LibraryUnits {
  string time_unit = 1;
  string capacitance_unit = 2;
  string voltage_unit = 3;
  string current_unit = 4;
  string resistance_unit = 5;
  string pulling_resistance_unit = 6;
  string leakage_power_unit = 7;
}

message LuTableTemplate {
  // E.g. "lu_table_template", "power_lut_template".
  string kind = 1;
  string name = 2;
  string variable_1 = 3;
  string variable_2 = 4;
  string variable_3 = 5;
  uint32 index_1_id = 6;
  uint32 index_2_id = 7;
  uint32 index_3_id = 8;
}

message LutAxis {
  repeated double values = 1;
}

message TimingArc {
  string related_pin = 1;
  string timing_sense = 2;
  string timing_type = 3;
  string when = 4;
  repeated TimingTable tables = 5;
}

message TimingTable {
  string kind = 1;
  // 1-based reference into Library.lu_table_templates; 0 means unset.
  uint32 template_id = 2;
  uint32 index_1_id = 3;
  uint32 index_2_id = 4;
  uint32 index_3_id = 5;
  repeated float values = 6;
  repeated uint32 dimensions = 7;
  string template_name = 8;
}

message InternalPower {
  // Empty means the owning pin is the event source.
  repeated string related_pins = 1;
  string when = 2;
  string related_pg_pin = 3;
  repeated PowerTable tables = 4;
}

enum PowerTransition {
  POWER_TRANSITION_UNKNOWN = 0;
  POWER_TRANSITION_RISE = 1;
  POWER_TRANSITION_FALL = 2;
  // Liberty `power`, applicable to either direction.
  POWER_TRANSITION_BOTH = 3;
}

message PowerTable {
  PowerTransition transition = 1;
  // 1-based reference into Library.lu_table_templates; 0 means unset.
  uint32 template_id = 2;
  uint32 index_1_id = 3;
  uint32 index_2_id = 4;
  uint32 index_3_id = 5;
  // Flattened row-major values. The energy scale is voltage_unit squared
  // times capacitance_unit; nominal_voltage is not another multiplier.
  repeated float values = 6;
  repeated uint32 dimensions = 7;
  string template_name = 8;
}

enum SequentialKind {
  SEQUENTIAL_KIND_UNKNOWN = 0;
  SEQUENTIAL_KIND_FF = 1;
  SEQUENTIAL_KIND_LATCH = 2;
}

// Represents sequential behavior specified via `ff (...) { ... }` or
// `latch (...) { ... }` blocks in Liberty.
message Sequential {
  string state_var = 1;
  string next_state = 2;
  string clock_expr = 3;
  SequentialKind kind = 4;
  string clear_expr = 5;
  string preset_expr = 6;
  // Liberty's optional second ff/latch qualifier, which is the logical
  // complement of state_var (for example, IQN for IQ).
  optional string complementary_state_var = 7;
}
